# Bambu Lab A1 Mini - PLA Draft Config Preset (0.20mm Layer Height)

# Printer Settings
bed_shape = 0x0,180x0,180x180,0x180
max_print_height = 180
nozzle_diameter = 0.4
retract_length = 0.8
retract_speed = 30
deretract_speed = 30
retract_before_travel = 2
retract_layer_change = 1
z_offset = 0

# Filament Settings
filament_diameter = 1.75
extrusion_multiplier = 0.98

# Extrusion Widths (Bambu Studio explicitly overrides these for better squish/adhesion)
extrusion_width = 0.42
first_layer_extrusion_width = 0.50
perimeter_extrusion_width = 0.42
external_perimeter_extrusion_width = 0.42
infill_extrusion_width = 0.45
solid_infill_extrusion_width = 0.42
top_infill_extrusion_width = 0.42
temperature = 220
first_layer_temperature = 220
bed_temperature = 45
first_layer_bed_temperature = 45

# Cooling Settings
cooling = 1
fan_always_on = 1
min_fan_speed = 100
max_fan_speed = 100
bridge_fan_speed = 100
disable_fan_first_layers = 3
full_fan_speed_layer = 5

# Print Process Settings
layer_height = 0.2
first_layer_height = 0.2
perimeters = 3
fill_density = 15%
skirts = 3
skirt_distance = 6
brim_width = 5
brim_type = outer_only
fill_pattern = grid
solid_infill_every_layers = 0
bottom_solid_layers = 3
top_solid_layers = 4
travel_speed = 150
perimeter_speed = 60
infill_speed = 80
solid_infill_speed = 80
top_solid_infill_speed = 40
first_layer_speed = 20
gcode_comments = 1
output_filename_format = [input_file_basename].gcode

# Machine G-code
start_gcode = G90 ; use absolute coordinates\nM83 ; extruder relative mode\nM140 S[first_layer_bed_temperature] ; set bed temp\nM104 S150 ; set extruder temp to 150C to soften plastic without oozing\nM190 S[first_layer_bed_temperature] ; wait for bed temp\nM109 S150 ; wait for extruder temp\nG28 ; home all axes\nG29 ; auto bed leveling\nM412 S1 ; turn on filament runout detection\nG392 S0 ; turn on clog detect\nM620.3 W1 ; turn on filament tangle detection\nG1 Z5.0 F3000 ; move Z Axis up to prevent scratching\nM104 S[first_layer_temperature] ; set extruder temp to final temp\nM109 S[first_layer_temperature] ; wait for final extruder temp\nG1 X2.0 Y20 Z0.2 F5000.0 ; move to prime line start position\nG1 X2.0 Y150.0 Z0.2 F1500.0 E30 ; draw a thick prime line (increased E to prime empty nozzle)\nG1 X2.4 Y150.0 Z0.2 F5000.0 ; move slightly to side\nG1 X2.4 Y20 Z0.2 F1500.0 E30 ; draw second thick prime line loop\nG1 Z2.0 F3000 ; lift nozzle\nG92 E0 ; reset extruder
end_gcode = M104 S0 ; turn off nozzle temperature\nM140 S0 ; turn off bed temperature\nG91 ; relative positioning\nG1 E-2 F300 ; retract filament\nG1 Z+5.0 X-2 Y-2 F9000 ; move nozzle away from print\nG28 X0 Y0 ; home X and Y axis to park the toolhead\nM84 ; disable motors
slowdown_below_layer_time = 15
min_print_speed = 15
thumbnails = 256x256/PNG, 16x16/PNG
